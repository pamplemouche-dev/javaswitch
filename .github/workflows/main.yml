name: Mekanism Native NSP Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile Native NSP Components
        run: |
          # 1. Configuration des variables d'environnement
          export DEVKITPRO=/opt/devkitpro
          export DEVKITARM=$DEVKITPRO/devkitARM
          export DEVKITA64=$DEVKITPRO/devkitA64
          export PATH=$PATH:$DEVKITPRO/tools/bin:$DEVKITA64/bin
          
          # 2. On force la reconnaissance de l'outil nacp
          chmod +x /opt/devkitpro/tools/bin/nacp
          
          # 3. Génération du NACP (L'identité du jeu)
          /opt/devkitpro/tools/bin/nacp -c --name "Mekanism" --author "Pamplemouche" --version "1.0.0" Mekanism.nacp
          
          # 4. Compilation du binaire ELF (Le moteur du jeu)
          # On utilise les chemins directs pour éviter l'erreur "not found"
          $DEVKITA64/bin/aarch64-none-elf-gcc -O2 -Wall -I$DEVKITPRO/libnx/include main.c -o Mekanism.elf -specs=$DEVKITPRO/libnx/switch.specs -L$DEVKITPRO/libnx/lib -lnx

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Mekanism-NSP-Parts
          path: |
            Mekanism.elf
            Mekanism.nacp
