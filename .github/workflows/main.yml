name: Mekanism Native NSP Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile Native NSP Components
        run: |
          # 1. Définition manuelle des chemins d'outils
          export DEVKITPRO=/opt/devkitpro
          export DEVKITA64=$DEVKITPRO/devkitA64
          # On ajoute tous les dossiers 'bin' possibles au PATH
          export PATH=$PATH:$DEVKITPRO/tools/bin:$DEVKITA64/bin
          
          # 2. Création de l'identité du jeu (Mekanism.nacp)
          # On teste deux emplacements courants pour l'outil nacp
          if [ -f /opt/devkitpro/tools/bin/nacp ]; then
            /opt/devkitpro/tools/bin/nacp -c --name "Mekanism" --author "Pamplemouche" --version "1.0.0" Mekanism.nacp
          else
            nacp -c --name "Mekanism" --author "Pamplemouche" --version "1.0.0" Mekanism.nacp
          fi
          
          # 3. Compilation du binaire (Mekanism.elf)
          aarch64-none-elf-gcc -O2 -Wall -I$DEVKITPRO/libnx/include main.c -o Mekanism.elf -specs=$DEVKITPRO/libnx/switch.specs -L$DEVKITPRO/libnx/lib -lnx

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Mekanism-NSP-Parts
          path: |
            Mekanism.elf
            Mekanism.nacp
