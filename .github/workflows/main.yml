name: Build PojavLauncher Switch (NSP)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -i python3 python3-pip -y
          # Installation de l'outil pour créer le NSP
          pip3 install nnpy pycryptodome

      - name: Compile Source to ELF
        run: |
          # Remplace cette ligne par ta commande de compilation réelle (make, cmake, etc.)
          # Exemple : make -j$(nproc)
          echo "Compilation de l'exécutable ELF..."
          # Supposons que le résultat est 'pojav.elf'

      - name: Create NACP and NRO
        run: |
          # Création manuelle du NACP (Nom, Auteur, Version)
          nacptool --create "PojavLauncher" "Pamplemouche" "1.0.0" pojav.nacp
          
          # Conversion ELF -> NRO avec ton NACP et ton icône
          elf2nro pojav.elf pojav.nro --nacp=pojav.nacp --icon=icon.jpg

      - name: Generate NSP
        run: |
          # Utilisation d'un script de forwarder ou tool pour packager en NSP
          # Note : Tu peux utiliser 'striker' ou 'nro2nsp' ici.
          # Voici l'exemple pour générer le NSP final :
          mkdir -out
          # Commande théorique selon ton outil de packaging :
          # nro2nsp --nro pojav.nro --out out/PojavLauncher.nsp --titleid "05B0000000000000"
          
          # Pour l'instant, on prépare le NRO si le builder NSP n'est pas encore setup
          cp pojav.nro out/

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: PojavLauncher-Build
          path: out/
