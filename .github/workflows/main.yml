name: Mekanism Native NSP Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install and Compile
        run: |
          # 1. On réinstalle les outils et on force le lien
          sudo dkp-pacman -Syy --noconfirm switch-tools switch-examples
          
          # 2. On définit les variables de compilation
          export DEVKITPRO=/opt/devkitpro
          export DEVKITA64=$DEVKITPRO/devkitA64
          
          # 3. Génération du NACP (L'identité du jeu)
          # On utilise le chemin ABSOLU direct pour éviter le "not found"
          /opt/devkitpro/tools/bin/nacp -c --name "Mekanism" --author "Pamplemouche" --version "1.0.0" Mekanism.nacp
          
          # 4. Compilation du binaire ELF (Le moteur)
          # On utilise le chemin ABSOLU vers GCC aussi
          /opt/devkitpro/devkitA64/bin/aarch64-none-elf-gcc -O2 -Wall -I/opt/devkitpro/libnx/include main.c -o Mekanism.elf -specs=/opt/devkitpro/libnx/switch.specs -L/opt/devkitpro/libnx/lib -lnx

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Mekanism-NSP-Files
          path: |
            Mekanism.elf
            Mekanism.nacp
