name: Mekanism Native NSP Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile Native NSP Components
        run: |
          # 1. On réinitialise les variables d'environnement proprement
          export DEVKITPRO=/opt/devkitpro
          export DEVKITA64=$DEVKITPRO/devkitA64
          # Cette ligne magique cherche où est caché l'outil 'nacp' et l'ajoute au chemin
          export PATH=$PATH:$(find /opt/devkitpro -name bin -type d | tr '\n' ':')
          
          # 2. Vérification (pour le debug)
          echo "Utilisation de gcc depuis : $(which aarch64-none-elf-gcc)"
          
          # 3. Génération du NACP (L'identité du jeu)
          # On utilise 'find' pour être sûr de lancer le bon nacp
          $(find /opt/devkitpro -name nacp) -c --name "Mekanism" --author "Pamplemouche" --version "1.0.0" Mekanism.nacp
          
          # 4. Compilation du binaire ELF
          aarch64-none-elf-gcc -O2 -Wall -I$DEVKITPRO/libnx/include main.c -o Mekanism.elf -specs=$DEVKITPRO/libnx/switch.specs -L$DEVKITPRO/libnx/lib -lnx

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Mekanism-NSP-Parts
          path: |
            Mekanism.elf
            Mekanism.nacp
