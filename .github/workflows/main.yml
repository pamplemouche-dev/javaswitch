name: Mekanism Native NSP Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile Native NSP Components
        run: |
          # 1. On localise les outils dynamiquement pour éviter les erreurs de chemin
          NACP_PATH=$(find /opt/devkitpro -name nacp -type f | head -n 1)
          GCC_PATH=$(find /opt/devkitpro -name aarch64-none-elf-gcc -type f | head -n 1)
          
          echo "Outil NACP trouvé ici : $NACP_PATH"
          echo "Outil GCC trouvé ici : $GCC_PATH"

          # 2. Génération de l'identité du jeu (NACP)
          $NACP_PATH -c --name "Mekanism" --author "Pamplemouche" --version "1.0.0" Mekanism.nacp
          
          # 3. Compilation du binaire (ELF)
          # On ajoute les dossiers d'inclusion libnx
          $GCC_PATH -O2 -Wall -I/opt/devkitpro/libnx/include main.c -o Mekanism.elf -specs=/opt/devkitpro/libnx/switch.specs -L/opt/devkitpro/libnx/lib -lnx

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Mekanism-NSP-Parts
          path: |
            Mekanism.elf
            Mekanism.nacp
